<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Released Assets Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-lg">
        <a class="navbar-brand" th:href="@{/dashboard}">ICT Assets Tracking</a>
        <div class="ms-auto">
            <a th:href="@{/handover}" class="btn btn-light btn-sm me-2">Handover Dashboard</a>
            <a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a>
        </div>
    </div>
</nav>
<div class="container-lg mt-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="card-title">Released Assets Report</h3>
            <p class="text-muted">All released asset records with release details.</p>
            <div class="table-responsive mt-4">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Serial Number</th>
                            <th>Department</th>
                            <th>Check Number</th>
                            <th>TSN Code</th>
                            <th>Assets</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="asset : ${releasedAssets}">
                            <td th:text="${asset.id}">1</td>
                            <td th:text="${asset.name}">Asset</td>
                            <td th:text="${asset.serialNumber}">SN</td>
                            <td th:text="${asset.departmentName}">Dept</td>
                            <td th:text="${asset.checkNumber}">123</td>
                            <td th:text="${asset.tsnCode}">TSN</td>
                            <td>
                                <ul>
                                    <li th:each="name : ${asset.assetNames}" th:text="${name}">Asset Name</li>
                                </ul>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
