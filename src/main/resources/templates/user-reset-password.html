<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#0056b3;">
    <div class="container-lg">
        <a class="navbar-brand" th:href="@{/dashboard}">ICT Assets Tracking</a>
        <div class="ms-auto">
            <a th:href="@{/users}" class="btn btn-light btn-sm">Back to Users</a>
        </div>
    </div>
</nav>

<div class="container-lg mt-4">
    <div class="card">
        <div class="card-body">
            <h3 class="card-title">Reset Password for <span th:text="${user.username}">username</span></h3>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/users/{id}/reset-password(id=${id})}" th:object="${reset}" method="post">
                <div class="mb-3">
                    <label for="password" class="form-label">New Password</label>
                    <input type="password" th:field="*{password}" class="form-control" id="password" required />
                </div>
                <div class="mb-3">
                    <label for="confirm" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm" required />
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Reset Password</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Simple client-side confirmation of matching passwords
document.addEventListener('submit', function(e){
    const form = e.target;
    if (form.matches('form[th\:action]') || form.getAttribute('action').includes('/reset-password')){
        const pw = document.getElementById('password').value;
        const conf = document.getElementById('confirm').value;
        if (pw !== conf){
            e.preventDefault();
            alert('Passwords do not match');
        }
    }
});
</script>
</body>
</html>
