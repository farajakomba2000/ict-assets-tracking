<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asset Handover</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-lg">
        <a class="navbar-brand" th:href="@{/dashboard}">ICT Assets Tracking</a>
        <div class="ms-auto">
            <a th:href="@{/dashboard}" class="btn btn-light btn-sm me-2">Dashboard</a>
            <a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">Asset Handover Form</h4>
                    <div>
                        <a th:href="@{/reports/released-assets}" class="btn btn-outline-light btn-sm me-2">Released Assets Report</a>
                    </div>
                </div>
                <div class="card-body">
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <strong>Error:</strong> <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <form id="releaseForm" th:action="@{/assets/release}" th:object="${asset}" method="post">
                        <!-- Hidden field to submit selected asset id -->
                        <input type="hidden" id="assetIdHidden" th:field="*{id}" />
                        <div class="mb-3" id="filteredAssetsContainer">
                            <div id="filteredAssets"></div>
                        </div>
                            <div class="mb-3">
                                <label for="userSearch" class="form-label">Owner (Search by Name)</label>
                                <input type="text" class="form-control" id="userSearch" placeholder="Search by first or last name..." autocomplete="off" />
                                <div id="userSearchResults" class="list-group mt-2" style="display: none; position: absolute; z-index: 1000; width: 94%;"></div>
                                <small id="ownerDeptHint" class="text-muted"></small>
                            </div>

                        <!-- removed global current check number, cancel and confirm buttons; per-asset Release buttons shown in results -->
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    (function(){
        const userSearch = document.getElementById('userSearch');
        const userSearchResults = document.getElementById('userSearchResults');
        const ownerDeptHint = document.getElementById('ownerDeptHint');
        const assetInput = document.getElementById('assetIdHidden');
        let searchTimeout;

        function clearResults(){
            userSearchResults.innerHTML = '';
            userSearchResults.style.display = 'none';
        }

        userSearch.addEventListener('input', function(){
            clearTimeout(searchTimeout);
            const q = this.value.trim();
            ownerDeptHint.textContent = '';
            if(q.length < 2){ clearResults(); return; }
            searchTimeout = setTimeout(() => {
                fetch(`/api/users/search?q=${encodeURIComponent(q)}`)
                    .then(res => res.json())
                    .then(users => {
                        userSearchResults.innerHTML = '';
                        if(!users || users.length === 0){ clearResults(); return; }
                        users.forEach(user => {
                            const btn = document.createElement('button');
                            btn.type = 'button';
                            btn.className = 'list-group-item list-group-item-action';
                            btn.innerHTML = `<div><strong>${user.fullName}</strong></div><small class="text-muted">${user.departmentName || ''}</small>`;
                            btn.addEventListener('click', function(e){
                                e.preventDefault();
                                userSearch.value = user.fullName;
                                ownerDeptHint.textContent = user.departmentName ? 'Department: ' + user.departmentName : '';
                                clearResults();
                                filterAssetsByUser(user);
                            });
                            userSearchResults.appendChild(btn);
                        });
                        userSearchResults.style.display = 'block';
                    })
                    .catch(err => { clearResults(); console.error(err); });
            }, 250);
        });

        function renderFiltered(filtered, user) {
            const container = document.getElementById('filteredAssets');
            container.innerHTML = '';
            if(!filtered || filtered.length === 0){
                ownerDeptHint.textContent = (user.departmentName ? 'Department: ' + user.departmentName + ' - ' : '') + 'No matching unreleased assets found.';
                return;
            }
            ownerDeptHint.textContent = user.departmentName ? 'Department: ' + user.departmentName : '';

            filtered.forEach(a => {
                const card = document.createElement('div');
                card.className = 'card mb-2';
                const nameText = (a.name ? a.name : 'Unnamed') + ' - ' + (a.serialNumber ? a.serialNumber : 'No SN') + ' (' + (a.departmentName ? a.departmentName : '-') + ')';
                card.innerHTML = `
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div><strong>${nameText}</strong></div>
                            <div class="text-muted">Check#: ${a.checkNumber || '-'}</div>
                        </div>
                        <div>
                            <button type="button" class="btn btn-sm btn-danger release-btn">Release</button>
                        </div>
                    </div>
                `;
                const btn = card.querySelector('.release-btn');
                btn.addEventListener('click', function(){
                    const confirmMsg = 'Confirm release for asset: ' + (a.name || a.serialNumber);
                    if(confirm(confirmMsg)){
                        assetInput.value = a.id;
                        document.getElementById('releaseForm').submit();
                    }
                });
                container.appendChild(card);
            });
        }

        function filterAssetsByUser(user){
            fetch('/api/assets')
                .then(res => res.json())
                .then(list => {
                    const filtered = list.filter(a => {
                        if (a.isreleased === true || a.isreleased === 'true') {
                            return false;
                        }
                        const ownerFull = (((a.ownerFirstName || '') + (a.ownerLastName ? ' ' + a.ownerLastName : '')).trim()).toLowerCase();
                        const matchByCheck = user.checkNumber != null && a.checkNumber != null && a.checkNumber.toString() === user.checkNumber.toString();
                        const matchByName = user.fullName && ownerFull.indexOf(user.fullName.toLowerCase()) !== -1;
                        return matchByCheck || matchByName;
                    });
                    renderFiltered(filtered, user);
                })
                .catch(err => { console.error(err); ownerDeptHint.textContent = 'Error loading assets'; });
        }

        document.addEventListener('click', function(e){
            if(e.target !== userSearch && e.target !== userSearchResults) clearResults();
        });
    })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
