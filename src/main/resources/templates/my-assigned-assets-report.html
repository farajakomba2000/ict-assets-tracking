<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Assigned Assets Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #0056b3 !important; }
        .page-header { color: #0056b3; font-weight: 700; }
        .report-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 0.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .report-title { 
            font-size: 2rem; 
            font-weight: 700; 
            color: #0056b3;
        }
        .report-info {
            text-align: right;
        }
        .total-assets {
            font-size: 1.5rem;
            font-weight: 700;
            color: #28a745;
            margin-bottom: 10px;
        }
        .total-label {
            font-size: 0.9rem;
            color: #6c757d;
        }
        .user-info {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-top: 10px;
        }
        .assets-table {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .table thead {
            background-color: #f0f3f7;
        }
        .table th {
            color: #0056b3;
            font-weight: 600;
            border-bottom: 2px solid #0056b3;
        }
        .table td {
            vertical-align: middle;
            padding: 12px;
        }
        .table-hover tbody tr:hover {
            background-color: #f5f8fb;
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        .btn-back {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-lg">
        <a class="navbar-brand" th:href="@{/dashboard}">ICT Assets Tracking</a>
        <div class="ms-auto">
            <a th:href="@{/dashboard}" class="btn btn-light btn-sm me-2">Dashboard</a>
            <a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container-lg mt-5">
    <a th:href="@{/dashboard}" class="btn btn-secondary btn-back">← Back to Dashboard</a>
    
    <div class="report-header">
        <div>
            <h1 class="report-title">My Assigned Assets Report</h1>
        </div>
        <div class="report-info">
            <div class="total-assets" th:text="${assetCount}">0</div>
            <div class="total-label">Total Assets</div>
            <div class="user-info" th:text="${userDisplayName}">User (000)</div>
        </div>
    </div>

    <div th:if="${assetCount > 0}" class="assets-table">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Asset Name</th>
                        <th>Serial Number</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="asset : ${assets}">
                        <td th:text="${asset.name}">Asset Name</td>
                        <td th:text="${asset.serialNumber}">Serial Number</td>
                        <td th:text="${asset.description}">Description</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${assetCount == 0}" class="empty-message">
        <p>No assets currently assigned to you.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
