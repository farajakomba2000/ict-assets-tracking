<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Assets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #f8f9fa; }
        .page-header { color: #0056b3; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container-lg mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="page-header">My Assigned Assets</h1>
        <a href="/my-assets/new" class="btn btn-primary">Add Asset</a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Serial</th>
                        <th>Department</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="asset : ${assets}">
                        <td th:text="${asset.id}">1</td>
                        <td th:text="${asset.name}">Laptop</td>
                        <td th:text="${asset.serialNumber}">SN</td>
                        <td th:text="${asset.departmentName}">IT</td>
                        <td th:text="${asset.description}">Desc</td>
                        <td>
                            <a th:href="@{/my-assets/{id}/edit(id=${asset.id})}" class="btn btn-sm btn-primary">Edit</a>
                            <form th:action="@{/my-assets/{id}/delete(id=${asset.id})}" method="post" style="display:inline; margin-left:.25rem;">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete asset?');">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
