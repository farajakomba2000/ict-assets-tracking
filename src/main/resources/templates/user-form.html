<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #0056b3 !important; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 8px; }
        .form-label { font-weight: 600; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-lg">
        <span class="navbar-brand">ICT Assets Tracking</span>
        <div class="ms-auto">
            <a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container-lg mt-4">
    <div class="card">
        <div class="card-header">
            <h5 th:if="${username}" class="mb-0">Edit User</h5>
            <h5 th:unless="${username}" class="mb-0">Create User</h5>
        </div>
        <div class="card-body">
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:if="${username}" th:action="@{/users/{id}(id=${id})}" th:object="${update}" method="post">
                <div class="mb-3">
                    <label class="form-label" th:text="${displayUsernameLabel != null ? displayUsernameLabel : 'Username'}">Username</label>
                    <input type="text" class="form-control" th:value="${username}" readonly />
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">New Password (leave blank to keep)</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" />
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="enabled" th:field="*{enabled}" />
                    <label class="form-check-label" for="enabled">Enabled</label>
                </div>
                <div class="mb-3">
                    <label class="form-label">Roles</label>
                    <div th:each="role : ${roles}">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" th:field="*{roles}" th:id="${role}" th:value="${role}" />
                            <label class="form-check-label" th:for="${role}" th:text="${role}"></label>
                        </div>
                    </div>
                    <a th:href="@{/users/{id}/roles/add(id=${id})}" class="btn btn-sm btn-outline-primary mt-2">+ Add Role</a>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/users" class="btn btn-secondary ms-2">Cancel</a>
            </form>

            <form th:unless="${username}" th:action="@{/users}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" required />
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" required />
                </div>
                <div class="mb-3">
                    <label class="form-label">Roles</label>
                    <div th:each="role : ${roles}">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" th:field="*{roles}" th:id="${role}" th:value="${role}" />
                            <label class="form-check-label" th:for="${role}" th:text="${role}"></label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Create</button>
                <a href="/users" class="btn btn-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
