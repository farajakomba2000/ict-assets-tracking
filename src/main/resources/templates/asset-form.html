<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${asset.id} == null ? 'Create Asset' : 'Edit Asset'">Asset Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-lg">
        <a class="navbar-brand" th:href="@{/dashboard}">ICT Assets Tracking</a>
        <div class="ms-auto">
            <a th:href="@{/dashboard}" class="btn btn-light btn-sm me-2">Dashboard</a>
            <a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${asset.id} == null ? 'Create Asset' : 'Edit Asset'">Asset Form</h4>
                </div>
                <div class="card-body">
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <strong>Error:</strong> <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <form th:action="${asset.id} != null ? @{/assets/{id}(id=${asset.id})} : @{/assets}" th:object="${asset}" method="post">
                        <input type="hidden" th:field="*{id}" />
                        
                        <div class="mb-3">
                            <label class="form-label">Assignment Type</label>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" id="assignmentIndividual" name="assignmentType" th:field="*{assignmentType}" value="Individual" />
                                    <label class="form-check-label" for="assignmentIndividual">Individual</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" id="assignmentInstitution" name="assignmentType" th:field="*{assignmentType}" value="Institution" />
                                    <label class="form-check-label" for="assignmentInstitution">Institution</label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3" id="userSearchGroup">
                            <label for="userSearch" class="form-label">Owner (Search by Name)</label>
                            <input type="text" class="form-control" id="userSearch" placeholder="Search by first or last name..." autocomplete="off" />
                            <div id="userSearchResults" class="list-group mt-2" style="display: none; position: absolute; z-index: 1000; width: 94%;"></div>
                        </div>
                        
                        <div class="mb-3" id="institutionDepartmentGroup" style="display: none;">
                            <label for="departmentName" class="form-label">Department</label>
                            <select class="form-control" id="departmentName" th:field="*{departmentName}">
                                <option value="">-- Select a Department --</option>
                                <option th:each="dept : ${distinctDepartments}" th:value="${dept}" th:text="${dept}"></option>
                            </select>
                        </div>
                        
                        <div class="mb-3" id="checkNumberGroup">
                            <label for="checkNumber" class="form-label">Check Number</label>
                            <input type="text" class="form-control" id="checkNumber" th:field="*{checkNumber}" 
                                   readonly required />
                            <small class="text-muted" th:if="${asset.checkNumber != null}">Your check number (auto-populated)</small>
                        </div>

                        <div class="mb-3">
                            <label for="mainCategory" class="form-label">Category</label>
                            <select class="form-control" id="mainCategory" th:field="*{mainCategoryId}">
                                <option value="">-- Select a Category --</option>
                                <option th:each="mc : ${mainCategories}" th:value="${mc.id}" th:text="${mc.name}">Category</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label">Subcategory</label>
                            <select class="form-control" id="category" th:field="*{categoryId}">
                                <option value="">-- Select a Subcategory --</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" required readonly />
                        </div>
                        <div class="mb-3">
                            <label for="serialNumber" class="form-label">Serial Number</label>
                            <input type="text" class="form-control" id="serialNumber" th:field="*{serialNumber}" required />
                        </div>
                        
                        <div class="mb-3">
                            <label for="tsnCode" class="form-label">TSN Code</label>
                            <input type="text" class="form-control" id="tsnCode" th:field="*{tsnCode}" />
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                        </div>
                        
                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-end">
                            <button type="submit" class="btn btn-primary" th:text="${asset.id} == null ? 'Create' : 'Update'">Save</button>
                            <a th:href="@{/assets}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const categorySelect = document.getElementById('category');
    const nameInput = document.getElementById('name');
    const assignmentIndividual = document.getElementById('assignmentIndividual');
    const assignmentInstitution = document.getElementById('assignmentInstitution');
    const userSearchGroup = document.getElementById('userSearchGroup');
    const institutionDepartmentGroup = document.getElementById('institutionDepartmentGroup');

    function updateAssignmentMode() {
        const assignmentType = assignmentInstitution.checked ? 'Institution' : 'Individual';
        if (assignmentType === 'Institution') {
            userSearchGroup.style.display = 'none';
            institutionDepartmentGroup.style.display = 'block';
        } else {
            userSearchGroup.style.display = 'block';
            institutionDepartmentGroup.style.display = 'none';
        }
    }

    assignmentIndividual.addEventListener('change', updateAssignmentMode);
    assignmentInstitution.addEventListener('change', updateAssignmentMode);

    window.addEventListener('load', updateAssignmentMode);

    function updateNameFromCategory() {
        const selectedOption = categorySelect.options[categorySelect.selectedIndex];
        if (selectedOption && selectedOption.value) {
            nameInput.value = selectedOption.textContent;
        }
    }

    document.getElementById('mainCategory').addEventListener('change', function() {
        const mainCategoryId = this.value;
        categorySelect.innerHTML = '<option value="">-- Select a Subcategory --</option>';
        
        if (mainCategoryId) {
            fetch(`/api/categories/${mainCategoryId}`)
                .then(response => response.json())
                .then(categories => {
                    categories.forEach(category => {
                        const option = document.createElement('option');
                        option.value = category.id;
                        option.textContent = category.name;
                        categorySelect.appendChild(option);
                    });
                    updateNameFromCategory();
                })
                .catch(error => console.error('Error loading subcategories:', error));
        }
    });

    categorySelect.addEventListener('change', updateNameFromCategory);

    // Trigger change event on page load if mainCategory has a value
    window.addEventListener('load', function() {
        const mainCategorySelect = document.getElementById('mainCategory');
        if (mainCategorySelect.value) {
            mainCategorySelect.dispatchEvent(new Event('change'));
        }
    });

    // User search autocomplete
    const userSearch = document.getElementById('userSearch');
    const userSearchResults = document.getElementById('userSearchResults');
    const checkNumberInput = document.getElementById('checkNumber');
    let searchTimeout;
    const checkNumberGroup = document.getElementById('checkNumberGroup');


    userSearch.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        const query = this.value.trim();
        
        if (query.length < 2) {
            userSearchResults.style.display = 'none';
            return;
        }

        searchTimeout = setTimeout(() => {
            fetch(`/api/users/search?q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(users => {
                    userSearchResults.innerHTML = '';
                    if (users.length === 0) {
                        userSearchResults.style.display = 'none';
                        return;
                    }
                    
                    users.forEach(user => {
                        const resultItem = document.createElement('button');
                        resultItem.type = 'button';
                        resultItem.className = 'list-group-item list-group-item-action';
                        resultItem.innerHTML = `
                            <div><strong>${user.fullName}</strong></div>
                            <small class="text-muted">${user.departmentName || 'No Department'}</small>
                        `;
                        resultItem.addEventListener('click', function(e) {
                            e.preventDefault();
                            userSearch.value = user.fullName;
                            checkNumberInput.value = user.checkNumber;
                            userSearchResults.style.display = 'none';
                        });
                        userSearchResults.appendChild(resultItem);
                    });
                    userSearchResults.style.display = 'block';
                })
                .catch(error => console.error('Error searching users:', error));
        }, 300);
    });

    // Hide results when clicking outside
    document.addEventListener('click', function(e) {
        if (e.target !== userSearch && e.target !== userSearchResults) {
            userSearchResults.style.display = 'none';
        }
    });
</script>
