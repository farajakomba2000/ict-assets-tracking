<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User Asset Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #0056b3 !important; }
        .page-header { color: #0056b3; font-weight: 700; margin-bottom: 20px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 8px; }
        .table thead { background-color: #0056b3; color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-lg">
        <a class="navbar-brand" th:href="@{/dashboard}">ICT Assets Tracking</a>
        <div class="ms-auto">
            <a th:href="@{/dashboard}" class="btn btn-light btn-sm me-2">Dashboard</a>
            <a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container-lg mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="page-header">User Asset Assigned Report</h1>
            <p class="text-muted">Summary of assets assigned to each user by username and check number.</p>
        </div>
    </div>

    <!-- Search Form -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/reports/user-assets}" method="get" class="row g-3">
                <div class="col-md-8">
                    <input type="text" class="form-control" name="searchTerm" 
                           placeholder="Search by check number or username..." 
                           th:value="${searchTerm}" />
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary w-100">Search</button>
                    <a th:href="@{/reports/user-assets}" class="btn btn-secondary w-100 mt-2">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Username</th>
                        <th>Check Number</th>
                        <th>Assigned Assets</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row : ${reportRows}">
                        <td th:text="${row.id}">1</td>
                        <td th:text="${row.name}">Alice Smith</td>
                        <td th:text="${row.checkNumber}">123</td>
                        <td th:text="${row.assetCount}">7</td>
                        <td>
                            <a th:href="@{/users/{id}/assets(id=${row.id})}" class="btn btn-sm btn-primary">View Assets</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mt-3">
        <div>
            <p class="mb-0 text-muted">Showing <span th:text="${reportRows.size()}">0</span> of <span th:text="${totalRows}">0</span> users with assets.</p>
        </div>
        <nav aria-label="Page navigation">
            <ul class="pagination mb-0">
                <li class="page-item" th:classappend="${currentPage == 0}? 'disabled'">
                    <a class="page-link" th:href="@{/reports/user-assets(page=${currentPage - 1},size=${pageSize},searchTerm=${searchTerm})}">Previous</a>
                </li>
                <li class="page-item" th:each="pageNum : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${pageNum == currentPage}? 'active'">
                    <a class="page-link" th:href="@{/reports/user-assets(page=${pageNum},size=${pageSize},searchTerm=${searchTerm})}" th:text="${pageNum + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1}? 'disabled'">
                    <a class="page-link" th:href="@{/reports/user-assets(page=${currentPage + 1},size=${pageSize},searchTerm=${searchTerm})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
