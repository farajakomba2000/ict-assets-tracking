<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Asset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style> body { background:#f8f9fa; } .card { margin-top:20px; } </style>
</head>
<body>
<div class="container-lg">
    <div class="card">
        <div class="card-body">
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong>Error:</strong> <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <form th:action="${id} != null ? @{/my-assets/{id}(id=${id})} : @{/my-assets}" th:object="${asset}" method="post">
                <div class="mb-3">
                    <label for="mainCategory" class="form-label">Category</label>
                    <select class="form-control" id="mainCategory" th:field="*{mainCategoryId}">
                        <option value="">-- Select a Category --</option>
                        <option th:each="mc : ${mainCategories}" th:value="${mc.id}" th:text="${mc.name}">Category</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="category" class="form-label">Subcategory</label>
                    <select class="form-control" id="category" th:field="*{categoryId}">
                        <option value="">-- Select a Subcategory --</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" th:field="*{name}" id="name" class="form-control" required />
                </div>
                <div class="mb-3">
                    <label for="serialNumber" class="form-label">Serial Number</label>
                    <input type="text" th:field="*{serialNumber}" id="serialNumber" class="form-control" required />
                </div>
                <div class="mb-3">
                    <label for="tsnCode" class="form-label">TSN Code</label>
                    <input type="text" th:field="*{tsnCode}" id="tsnCode" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <input type="text" th:field="*{departmentName}" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}" class="form-control"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/my-assets" class="btn btn-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const categorySelect = document.getElementById('category');
    const nameInput = document.getElementById('name');

    function updateNameFromCategory() {
        const selectedOption = categorySelect.options[categorySelect.selectedIndex];
        if (selectedOption && selectedOption.value) {
            nameInput.value = selectedOption.textContent;
        }
    }

    document.getElementById('mainCategory').addEventListener('change', function() {
        const mainCategoryId = this.value;
        categorySelect.innerHTML = '<option value="">-- Select a Subcategory --</option>';
        
        if (mainCategoryId) {
            fetch(`/api/categories/${mainCategoryId}`)
                .then(response => response.json())
                .then(categories => {
                    categories.forEach(category => {
                        const option = document.createElement('option');
                        option.value = category.id;
                        option.textContent = category.name;
                        categorySelect.appendChild(option);
                    });
                    updateNameFromCategory();
                })
                .catch(error => console.error('Error loading subcategories:', error));
        }
    });

    categorySelect.addEventListener('change', updateNameFromCategory);

    // Trigger change event on page load if mainCategory has a value
    window.addEventListener('load', function() {
        const mainCategorySelect = document.getElementById('mainCategory');
        if (mainCategorySelect.value) {
            mainCategorySelect.dispatchEvent(new Event('change'));
        }
    });
</script>
</body>
</html>
