<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage User Roles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #0056b3 !important; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 8px; }
        .form-label { font-weight: 600; }
        .role-list { gap: 1rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-lg">
        <span class="navbar-brand">ICT Assets Tracking</span>
        <div class="ms-auto">
            <a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container-lg mt-4">
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">Manage Roles for <span th:text="${user.username}">username</span></h5>
        </div>
        <div class="card-body">
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <div th:if="${#fields.hasErrors('roles')}" class="alert alert-danger">
                <span th:errors="*{roles}"></span>
            </div>

            <form th:action="@{/users/{id}/roles/add(id=${user.id})}" th:object="${rolesRequest}" method="post">
                <div class="mb-3">
                    <label class="form-label">Select Roles</label>
                    <div class="role-list d-flex flex-column">
                        <div th:each="role : ${roles}" class="form-check">
                            <input class="form-check-input" type="checkbox" th:field="*{roles}" th:id="${role}" th:value="${role}" />
                            <label class="form-check-label" th:for="${role}" th:text="${role}"></label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Save Roles</button>
                <a th:href="@{/users}" class="btn btn-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
